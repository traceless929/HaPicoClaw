configuration:
  model_name:
    name: Core - Model alias
    description: Internal model alias used by PicoClaw.
  model:
    name: Core - Model
    description: Provider and model identifier such as openai/gpt-5.2 or ollama/llama3.
  api_key:
    name: Core - API key
    description: API key for the selected provider. Leave empty only for local providers.
  api_base:
    name: Core - API base URL
    description: Optional custom OpenAI-compatible endpoint.
  request_timeout:
    name: Core - Request timeout
    description: Timeout in seconds for upstream model requests.
  qq_enabled:
    name: QQ - Enable channel
    description: Start PicoClaw with the QQ channel enabled.
  qq_app_id:
    name: QQ - App ID
    description: App ID used for the QQ channel.
  qq_app_secret:
    name: QQ - App secret
    description: App secret used for the QQ channel.
  qq_allow_from:
    name: QQ - Allowed users
    description: Optional comma or newline separated QQ user IDs that are allowed to use the bot.
  qq_reasoning_channel_id:
    name: QQ - Reasoning channel ID
    description: Optional QQ channel ID used for reasoning output.
  feishu_enabled:
    name: Feishu - Enable channel
    description: Start PicoClaw with the Feishu channel enabled.
  feishu_app_id:
    name: Feishu - App ID
    description: App ID used for the Feishu channel.
  feishu_app_secret:
    name: Feishu - App secret
    description: App secret used for the Feishu channel.
  feishu_encrypt_key:
    name: Feishu - Encrypt key
    description: Optional Feishu encrypt key used for encrypted event payloads.
  feishu_verification_token:
    name: Feishu - Verification token
    description: Optional Feishu verification token used for webhook validation.
  feishu_allow_from:
    name: Feishu - Allowed users
    description: Optional comma or newline separated Feishu user IDs that are allowed to use the bot.
  feishu_reasoning_channel_id:
    name: Feishu - Reasoning channel ID
    description: Optional Feishu channel ID used for reasoning output.
  discord_enabled:
    name: Discord - Enable channel
    description: Start PicoClaw with the Discord channel enabled.
  discord_token:
    name: Discord - Bot token
    description: Bot token used for the Discord channel.
  discord_allow_from:
    name: Discord - Allowed users
    description: Optional comma or newline separated Discord user IDs that are allowed to use the bot.
  discord_mention_only:
    name: Discord - Mention only
    description: Only respond in group chats when the bot is mentioned.
  discord_reasoning_channel_id:
    name: Discord - Reasoning channel ID
    description: Optional Discord channel ID used for reasoning output.
  enable_duckduckgo:
    name: Web Search - Enable DuckDuckGo search
    description: Enable DuckDuckGo as the default web search fallback.
  brave_api_key:
    name: Web Search - Brave API key
    description: Optional Brave Search API key.
  tavily_api_key:
    name: Web Search - Tavily API key
    description: Optional Tavily API key.
  searxng_base_url:
    name: Web Search - SearXNG base URL
    description: Optional SearXNG endpoint URL.
  ha_enabled:
    name: Home Assistant - Enable API integration
    description: Automatically configure Home Assistant MCP tools for PicoClaw.
  ha_url:
    name: Home Assistant - API URL
    description: Base Home Assistant API URL. Defaults to the internal Supervisor proxy endpoint.
  ha_use_supervisor_token:
    name: Home Assistant - Use Supervisor token
    description: Prefer the Supervisor token injected into the add-on to access the HA API.
  ha_token:
    name: Home Assistant - API token
    description: Optional long-lived access token. Required when Supervisor token usage is disabled.
  ha_readonly:
    name: Home Assistant - Read-only mode
    description: Only allow state queries and block control service calls.
  ha_allowed_domains:
    name: Home Assistant - Allowed domains
    description: Comma or newline separated HA domains that PicoClaw may query or control, such as light, switch, scene, and script.
  ha_allowed_entities:
    name: Home Assistant - Allowed entities
    description: Optional comma or newline separated entity_id allowlist for finer-grained access control.
  use_raw_config:
    name: Advanced - Use raw JSON config
    description: Bypass generated settings and write the full PicoClaw config JSON directly.
  raw_config:
    name: Advanced - Raw PicoClaw config JSON
    description: Full config.json content used when raw JSON config is enabled.

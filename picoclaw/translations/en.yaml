configuration:
  model_name:
    name: Model alias
    description: Internal model alias used by PicoClaw.
  model:
    name: Model
    description: Provider and model identifier such as openai/gpt-5.2 or ollama/llama3.
  api_key:
    name: API key
    description: API key for the selected provider. Leave empty only for local providers.
  api_base:
    name: API base URL
    description: Optional custom OpenAI-compatible endpoint.
  request_timeout:
    name: Request timeout
    description: Timeout in seconds for upstream model requests.
  enable_duckduckgo:
    name: Enable DuckDuckGo search
    description: Enable DuckDuckGo as the default web search fallback.
  brave_api_key:
    name: Brave API key
    description: Optional Brave Search API key.
  tavily_api_key:
    name: Tavily API key
    description: Optional Tavily API key.
  searxng_base_url:
    name: SearXNG base URL
    description: Optional SearXNG endpoint URL.
